<svg width="136" height="30" viewBox="0 0 136 30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fluxGrad" x1="4" y1="26" x2="26" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4CAF14"/>
      <stop offset="1" stop-color="#82FA1E"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect width="30" height="30" rx="8" fill="#12151A"/>

  <!-- circulating flux ring, open at top to suggest continuous flow -->
  <path d="M22.07 6.57A11 11 0 1 1 7.93 6.57" stroke="url(#fluxGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- arrowheads on the ring ends -->
  <path d="M22.07 6.57 L25.3 7.6 M22.07 6.57 L23.35 3.45" stroke="url(#fluxGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M7.93 6.57 L4.7 5.54 M7.93 6.57 L6.65 9.69" stroke="url(#fluxGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- inner pulse / price-flow bolt -->
  <path d="M9.5 19.5 L12.5 19.5 L14 13.5 L17 21 L20.5 9.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark: stuck together as one run, same coloring scheme as the original CoinPulse logo -->
  <text x="38" y="21" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#FFFFFF"><tspan font-weight="400">Crypto</tspan><tspan font-weight="700">Flux</tspan></text>
</svg>
